swagger: "2.0"
info:
  title: "Libar Zendesk Ticket API"
  version: "1.0"
  description: "Creates a Zendesk support ticket for Antikvarijat Libar from Microsoft Copilot Studio."
host: "antikvarijat-libar.zendesk.com"
basePath: "/api/v2"
schemes:
  - "https"
consumes:
  - "application/json"
produces:
  - "application/json"
securityDefinitions:
  basicAuth:
    type: "basic"
security:
  - basicAuth: []
paths:
  /tickets:
    post:
      summary: "Create Zendesk ticket"
      description: "Creates a new Zendesk ticket with requester details and the user's message."
      operationId: "CreateZendeskTicket"
      parameters:
        - name: "body"
          in: "body"
          required: true
          description: "Zendesk ticket payload."
          schema:
            $ref: "#/definitions/CreateTicketRequest"
      responses:
        "201":
          description: "Ticket created"
          schema:
            $ref: "#/definitions/CreateTicketResponse"
        "200":
          description: "Ticket created"
          schema:
            $ref: "#/definitions/CreateTicketResponse"
        default:
          description: "Error"
          schema:
            $ref: "#/definitions/ErrorResponse"
definitions:
  CreateTicketRequest:
    type: "object"
    required:
      - "ticket"
    properties:
      ticket:
        type: "object"
        required:
          - "subject"
          - "comment"
          - "requester"
        properties:
          subject:
            type: "string"
            description: "Ticket subject shown in Zendesk."
            x-ms-summary: "Subject"
            x-ms-visibility: "important"
          comment:
            type: "object"
            required:
              - "body"
            properties:
              body:
                type: "string"
                description: "Public comment body for the ticket."
                x-ms-summary: "Comment body"
                x-ms-visibility: "important"
              public:
                type: "boolean"
                description: "Set to true for a public ticket comment."
                default: true
                x-ms-summary: "Public comment"
                x-ms-visibility: "advanced"
          requester:
            type: "object"
            required:
              - "name"
              - "email"
            properties:
              name:
                type: "string"
                description: "Customer full name."
                x-ms-summary: "Requester name"
                x-ms-visibility: "important"
              email:
                type: "string"
                description: "Customer email."
                x-ms-summary: "Requester email"
                x-ms-visibility: "important"
          priority:
            type: "string"
            description: "Ticket priority."
            enum:
              - "low"
              - "normal"
              - "high"
              - "urgent"
            default: "normal"
            x-ms-summary: "Priority"
            x-ms-visibility: "advanced"
          status:
            type: "string"
            description: "Ticket status."
            enum:
              - "new"
              - "open"
              - "pending"
              - "hold"
              - "solved"
            default: "new"
            x-ms-summary: "Status"
            x-ms-visibility: "advanced"
          tags:
            type: "array"
            description: "Optional ticket tags."
            items:
              type: "string"
            x-ms-summary: "Tags"
            x-ms-visibility: "advanced"
  CreateTicketResponse:
    type: "object"
    properties:
      ticket:
        type: "object"
        properties:
          id:
            type: "integer"
            format: "int64"
            description: "Zendesk ticket ID."
            x-ms-summary: "Ticket ID"
          subject:
            type: "string"
            description: "Ticket subject."
          status:
            type: "string"
            description: "Ticket status."
          priority:
            type: "string"
            description: "Ticket priority."
          url:
            type: "string"
            description: "API URL of the created ticket."
      audit:
        type: "object"
        description: "Zendesk audit object returned on create."
  ErrorResponse:
    type: "object"
    properties:
      error:
        type: "string"
      description:
        type: "string"
