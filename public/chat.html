<!doctype html>
<html lang="hr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Antikvarijat Libar Chat</title>
  <meta name="description" content="Online pomoć pri kupnji — Antikvarijat Libar" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="/chat.css" />
</head>

<body>
  <div class="widget-backdrop"></div>

  <!-- Launcher Button -->
  <button id="chat-launcher" class="chat-launcher" type="button" aria-expanded="false" aria-label="Otvori chat">
    <svg class="chat-launcher__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
    </svg>
    <span id="chat-launcher-badge" class="chat-launcher__badge hidden" aria-hidden="true">0</span>
  </button>

  <!-- Chat Widget -->
  <aside id="chat-widget" class="chat-widget hidden" aria-hidden="true" role="dialog" aria-label="Chat podrška">

    <!-- ── Header ── -->
    <header class="chat-widget__header">
      <div class="chat-widget__header-left">
        <div class="chat-widget__avatar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          </svg>
        </div>
        <div class="chat-widget__header-copy">
          <p class="chat-widget__eyebrow">Antikvarijat Libar</p>
          <h1>Korisnička podrška</h1>
        </div>
      </div>

      <div class="chat-widget__header-actions">
        <div class="chat-widget__status">
          <span class="chat-widget__status-dot"></span>
          <span class="chat-widget__status-text">Aktivan</span>
        </div>
        <button id="chat-close" class="chat-widget__close" type="button" aria-label="Zatvori chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
    </header>

    <!-- ── Welcome Banner ── -->
    <div class="chat-widget__welcome">
      <div class="chat-widget__welcome-inner">
        <p class="chat-widget__welcome-title">Pitajte za knjige, otkup ili narudžbu</p>
        <p class="chat-widget__welcome-subtitle">Odgovor stiže odmah - agent se može uključiti u razgovor.</p>
      </div>
    </div>

    <!-- ── Chat Body ── -->
    <section id="chat-wrap" class="chat-wrap">
      <div id="messages" class="messages"></div>

      <!-- ── Input Area ── -->
      <div class="chat-input-area">
        <form id="message-form" class="message-form">
          <textarea id="message-input" rows="1" placeholder="Napišite poruku..." required></textarea>
          <button type="submit" aria-label="Pošalji poruku"></button>
        </form>

        <div id="pending-files-list" class="pending-files-list hidden" aria-live="polite"></div>

        <div class="chat-input-toolbar">
          <div class="chat-input-toolbar__left">
            <input type="file" id="file-input" multiple hidden />
            <label for="file-input" class="chat-input-toolbar__btn" aria-label="Priloži datoteku" tabindex="0">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
              </svg>
            </label>
            
            <input type="file" id="image-input" multiple hidden accept="image/*" />
            <label for="image-input" class="chat-input-toolbar__btn" aria-label="Priloži sliku" tabindex="0">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <polyline points="21 15 16 10 5 21" />
              </svg>
            </label>

            <div id="pending-files-indicator" class="pending-files-indicator hidden"></div>
          </div>
          <div class="chat-input-toolbar__right">
            <span class="chat-input-toolbar__hint">Enter za slanje</span>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Error ── -->
    <p id="error-box" class="error-box hidden"></p>

    <!-- ── Footer ── -->
    <footer class="chat-widget__footer">
      <span>Pokreće</span>
      <strong>Libar AI</strong>
      <span class="chat-widget__footer-dot">·</span>
      <span>Zendesk</span>
    </footer>
  </aside>

  <script src="/chat.js"></script>
</body>

</html>
