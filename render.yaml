services:
  - type: web
    name: libar-zendesk-bot
    runtime: node
    plan: starter
    branch: main
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 3000
      - key: ZENDESK_SUBDOMAIN
        sync: false
      - key: ZENDESK_EMAIL
        sync: false
      - key: ZENDESK_API_TOKEN
        sync: false
      - key: ZENDESK_WEBHOOK_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-5
      - key: OPENROUTER_FALLBACK_MODEL
        value: google/gemini-2.5-pro
      - key: OPENROUTER_SITE_URL
        sync: false
      - key: OPENROUTER_SITE_NAME
        value: Antikvarijat Libar Middleware Bot
      - key: EMBED_ALLOWED_ORIGINS
        sync: false
      - key: HELP_CENTER_CACHE_TTL_MS
        value: 300000
      - key: HELP_CENTER_CONTEXT_ARTICLES
        value: 5
      - key: KNOWLEDGE_CONTEXT_ITEMS
        value: 5
      - key: KNOWLEDGE_MIN_TOP_SCORE
        value: 5
      - key: ENABLE_EMAIL_SPAM_CLASSIFIER
        value: true
      - key: EMAIL_SPAM_AI_MIN_CONFIDENCE
        value: 0.75
      - key: ONEDRIVE_TENANT_ID
        sync: false
      - key: ONEDRIVE_CLIENT_ID
        sync: false
      - key: ONEDRIVE_CLIENT_SECRET
        sync: false
      - key: ONEDRIVE_DRIVE_ID
        sync: false
      - key: ONEDRIVE_SITE_ID
        sync: false
      - key: ONEDRIVE_FOLDER_ID
        sync: false
      - key: ONEDRIVE_FOLDER_URL
        sync: false
      - key: ONEDRIVE_CACHE_TTL_MS
        value: 300000
      - key: ONEDRIVE_CONTEXT_DOCUMENTS
        value: 3
      - key: ONEDRIVE_MAX_FILE_SIZE_BYTES
        value: 2097152
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_EMBEDDING_DIMENSIONS
        value: 1536
      - key: VECTOR_MATCH_COUNT
        value: 8
      - key: VECTOR_MIN_SCORE
        value: 0.68
      - key: VECTOR_CONTEXT_ITEMS
        value: 5
      - key: VECTOR_CHUNK_MAX_CHARS
        value: 1200
      - key: VECTOR_CHUNK_OVERLAP_CHARS
        value: 180
      - key: VECTOR_AUTO_SYNC_ENABLED
        value: false
      - key: VECTOR_AUTO_SYNC_INTERVAL_MS
        value: 86400000
